<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechPrime Soluções - Lista de Materiais</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
            background-color: #ffffff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        /* Top Bar & Header */
        .header-bg {
            background-color: #000000;
            padding: 25px 40px;
            border-bottom: 5px solid #39FF14;
            display: table;
            width: 100%;
        }

        .header-left {
            display: table-cell;
            vertical-align: middle;
            width: 50%;
        }

        .header-right {
            display: table-cell;
            vertical-align: middle;
            text-align: right;
            width: 50%;
            color: #ffffff;
            font-size: 13px;
        }

        .logo-area {
            display: inline-flex;
            align-items: center;
        }

        .logo-icon {
            width: 55px;
            height: 55px;
            margin-right: 15px;
            vertical-align: middle;
        }

        .logo-text {
            display: inline-block;
            vertical-align: middle;
            text-align: left;
        }

        .logo-title {
            color: #ffffff;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            line-height: 1;
        }

        .logo-title span {
            color: #39FF14;
        }

        .logo-subtitle {
            font-size: 11px;
            letter-spacing: 6px;
            color: #39FF14;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Header Contact Info */
        .header-contact-item {
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 8px;
        }
        
        .header-contact-item:last-child {
            margin-bottom: 0;
        }

        .header-contact-item span {
            color: #ffffff;
            font-weight: 500;
        }

        /* Document Title */
        .doc-title-container {
            padding: 25px 40px 10px 40px;
        }

        .doc-title {
            font-size: 24px;
            font-weight: 700;
            color: #111;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #111;
            padding-bottom: 5px;
        }

        /* Control Panel (Hidden during print) */
        .control-panel {
            background-color: #1e1e1e;
            padding: 15px 40px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
        }

        .btn {
            background-color: #39FF14;
            color: #000;
            border: none;
            padding: 10px 18px;
            font-size: 14px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background-color: #2ecc71;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
        }

        .btn-secondary:hover {
            background-color: #444;
        }

        .btn-danger {
            background-color: #e74c3c;
            color: white;
        }

        .btn-danger:hover {
            background-color: #c0392b;
        }

        .filename-input {
            padding: 9px 12px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: #fff;
            border-radius: 4px;
            font-size: 14px;
            width: 220px;
        }

        /* Table Styling */
        .table-container {
            padding: 20px 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background-color: #000000;
            color: #ffffff;
            font-size: 13px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 12px 10px;
            text-align: left;
            border: 1px solid #ddd;
        }

        th.center, td.center {
            text-align: center;
        }

        td {
            padding: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            vertical-align: top;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .item-row:hover {
            background-color: #f1f8f0;
        }

        /* Editable inputs inside table */
        .cell-input {
            width: 100%;
            border: 1px solid transparent;
            background: transparent;
            padding: 6px;
            font-size: 14px;
            resize: vertical;
            transition: all 0.15s;
        }

        .cell-input:hover {
            border-color: #ccc;
            background-color: #fff;
        }

        .cell-input:focus {
            border-color: #39FF14;
            background-color: #fff;
            outline: none;
            box-shadow: 0 0 4px rgba(57, 255, 20, 0.3);
        }

        .cell-input.item-num {
            text-align: center;
            font-weight: bold;
            color: #27ae60;
            font-size: 16px;
        }

        .cell-input.title-field {
            font-weight: bold;
        }

        .qty-field {
            text-align: center;
            font-weight: bold;
        }

        /* Image Placeholder / Upload */
        .img-container {
            width: 100px;
            min-height: 80px;
            border: 1px dashed #ccc;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            background-color: #fafafa;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto;
        }

        .img-container:hover {
            border-color: #39FF14;
        }

        .img-preview {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
        }

        .img-placeholder-text {
            font-size: 10px;
            color: #888;
            text-align: center;
            padding: 5px;
        }

        .file-input {
            display: none;
        }

        .action-cell {
            text-align: center;
            vertical-align: middle;
        }

        .add-row-container {
            padding: 0 40px 30px 40px;
            text-align: right;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.6);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 8px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 2px solid #39FF14;
            padding-bottom: 5px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }

        .form-control {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-control:focus {
            outline: none;
            border-color: #39FF14;
        }

        .modal-footer {
            text-align: right;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        /* Print Optimization */
        @media print {
            body {
                background-color: #fff;
                padding: 0;
            }
            .container {
                box-shadow: none;
                max-width: 100%;
                border-radius: 0;
            }
            .control-panel, .action-header, .action-cell, .add-row-container {
                display: none !important;
            }
            .cell-input {
                border: none !important;
                background: transparent !important;
                padding: 2px !important;
                box-shadow: none !important;
            }
            .img-container {
                border: none !important;
                background: transparent !important;
            }
            .img-placeholder-text {
                display: none !important;
            }
            tr:nth-child(even) {
                background-color: #f9f9f9 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .header-bg {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                background-color: #000000 !important;
                display: table !important;
            }
            .header-left, .header-right {
                display: table-cell !important;
            }
            .logo-title span, .logo-subtitle {
                color: #39FF14 !important;
            }
        }
    </style>
</head>

    <script>
        const initialMaterials = [
            { id: 1, desc: "Quadro de distribuição para 24 disjuntores (com barramento neutro e terra)", spec: "Capacidade: 24 disjuntores\nCom barramento neutro e terra\nPadrão DIN", qty: 1, img: "" },
            { id: 2, desc: "Barramento pente bipolar", spec: "Bipolar\n63A\nPadrão DIN", qty: 1, img: "" },
            { id: 3, desc: "Disjuntor Bipolar 63A", spec: "Bipolar\n63A\nCurva C\nPadrão DIN", qty: 1, img: "" },
            { id: 4, desc: "Disjuntor Monopolar 50A", spec: "Monopolar\n50A\nCurva C\nPadrão DIN", qty: 1, img: "" },
            { id: 5, desc: "Disjuntor Monopolar 32A", spec: "Monopolar\n32A\nCurva C\nPadrão DIN", qty: 1, img: "" },
            { id: 6, desc: "Disjuntor Monopolar 16A", spec: "Monopolar\n16A\nCurva C\nPadrão DIN", qty: 1, img: "" },
            { id: 7, desc: "Disjuntor Monopolar 25A", spec: "Monopolar\n25A\nCurva C\nPadrão DIN", qty: 1, img: "" }
        ];

        function initTable() {
            strokeTable(initialMaterials);
        }

        function strokeTable(items) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = "";
            items.forEach((item, index) => {
                tbody.appendChild(createRowElement(item.id || (index + 1), item.desc, item.spec, item.qty, item.img));
            });
            reindexItems();
        }

        function createRowElement(itemNum, desc, spec, qty, imgBase64 = "") {
            const tr = document.createElement('tr');
            tr.className = "item-row";
            
            const tdNum = document.createElement('td');
            tdNum.className = "center";
            tdNum.innerHTML = `<input type="text" class="cell-input item-num" value="${itemNum}" readonly>`;
            tr.appendChild(tdNum);

            const tdDesc = document.createElement('td');
            tdDesc.innerHTML = `<textarea class="cell-input title-field" rows="3">${desc}</textarea>`;
            tr.appendChild(tdDesc);

            const tdSpec = document.createElement('td');
            tdSpec.innerHTML = `<textarea class="cell-input" rows="3">${spec}</textarea>`;
            tr.appendChild(tdSpec);

            const tdQty = document.createElement('td');
            tdQty.className = "center";
            tdQty.innerHTML = `<input type="number" class="cell-input qty-field" value="${qty}" min="0">`;
            tr.appendChild(tdQty);

            const tdImg = document.createElement('td');
            tdImg.className = "center";
            const hasImg = imgBase64 && imgBase64.length > 0;
            tdImg.innerHTML = `
                <div class="img-container" onclick="triggerImageUpload(this)">
                    <span class="img-placeholder-text" style="display: ${hasImg ? 'none' : 'block'}">Clique para<br>imagem</span>
                    <img class="img-preview" src="${imgBase64 || ''}" style="display: ${hasImg ? 'block' : 'none'}">
                    <input type="file" class="file-input" accept="image/*" onchange="handleImageChange(event, this)">
                </div>
            `;
            tr.appendChild(tdImg);

            const tdAction = document.createElement('td');
            tdAction.className = "center action-cell";
            tdAction.innerHTML = `
                <button class="btn btn-danger" style="padding: 5px 10px; font-size: 11px;" onclick="removeRow(this)">X</button>
            `;
            tr.appendChild(tdAction);

            return tr;
        }

        function addNewRow() {
            const tbody = document.getElementById('tableBody');
            const nextIndex = tbody.children.length + 1;
            const newRow = createRowElement(nextIndex, "Novo Item", "Especificações aqui", 1, "");
            tbody.appendChild(newRow);
            reindexItems();
        }

        function removeRow(btn) {
            if(confirm("Tem certeza que deseja excluir este item da lista?")) {
                const row = btn.closest('tr');
                row.remove();
                reindexItems();
            }
        }

        function reindexItems() {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row, idx) => {
                row.querySelector('.item-num').value = idx + 1;
            });
        }

        function triggerImageUpload(container) {
            container.querySelector('.file-input').click();
        }

        function handleImageChange(event, input) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const container = input.closest('.img-container');
                    const img = container.querySelector('.img-preview');
                    const placeholder = container.querySelector('.img-placeholder-text');
                    img.src = e.target.result;
                    img.style.display = 'block';
                    placeholder.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        }

        function openModal() {
            document.getElementById('inputPhone').value = document.getElementById('displayPhone').innerText;
            document.getElementById('inputEmail').value = document.getElementById('displayEmail').innerText;
            document.getElementById('inputSite').value = document.getElementById('displaySite').innerText;
            document.getElementById('contactModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('contactModal').style.display = 'none';
        }

        function saveModalData() {
            document.getElementById('displayPhone').innerText = document.getElementById('inputPhone').value.trim();
            document.getElementById('displayEmail').innerText = document.getElementById('inputEmail').value.trim();
            document.getElementById('displaySite').innerText = document.getElementById('inputSite').value.trim();
            closeModal();
        }

        function generatePDF() {
            const userFilename = document.getElementById('filename').value.trim() || 'Lista_de_Materiais';
            document.title = userFilename;
            window.print();
        }

        function exportData() {
            const rows = document.querySelectorAll('#tableBody tr');
            const tableData = [];
            
            rows.forEach((row, idx) => {
                const desc = row.querySelectorAll('.cell-input')[1].value;
                const spec = row.querySelectorAll('.cell-input')[2].value;
                const qty = row.querySelector('.qty-field').value;
                const img = row.querySelector('.img-preview').src;
                
                tableData.push({
                    id: idx + 1,
                    desc: desc,
                    spec: spec,
                    qty: qty,
                    img: img.startsWith('data:') ? img : ""
                });
            });

            const projectData = {
                header: {
                    phone: document.getElementById('displayPhone').innerText,
                    email: document.getElementById('displayEmail').innerText,
                    site: document.getElementById('displaySite').innerText
                },
                materials: tableData
            };

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(projectData, null, 2));
            const downloadAnchor = document.createElement('a');
            const filename = document.getElementById('filename').value.trim() || 'lista_materiais_projeto';
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `${filename}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importData(event) {
            const input = event.target;
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    
                    if (Array.isArray(importedData)) {
                        strokeTable(importedData);
                        alert("Lista de materiais importada com sucesso!");
                    } else if (importedData.materials && Array.isArray(importedData.materials)) {
                        if (importedData.header) {
                            document.getElementById('displayPhone').innerText = importedData.header.phone || "21 98933-6201";
                            document.getElementById('displayEmail').innerText = importedData.header.email || "contato@techprimesolucoes.com.br";
                            document.getElementById('displaySite').innerText = importedData.header.site || "www.techprimesolucoes.com.br";
                        }
                        strokeTable(importedData.materials);
                        alert("Projeto e dados do cabeçalho importados com sucesso!");
                    } else {
                        alert("Formato de arquivo inválido.");
                    }
                } catch (error) {
                    alert("Erro ao ler o arquivo JSON.");
                }
            };
            reader.readAsText(file);
            input.value = '';
        }

        window.onload = initTable;
    </script>
</body>
</html>
